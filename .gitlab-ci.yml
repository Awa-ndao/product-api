stages:
  - test
  - build
  - docker

test:
  stage: test
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "Tests skipped - Nexus local non accessible en CI"
  only:
    - develop

build:
  stage: build
  image: maven:3.9.6-eclipse-temurin-17
  script:
    - echo "Build skipped - JAR deja present dans image Docker"
  only:
    - develop

docker:
  stage: docker
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  script:
    - docker login -u $DOCKER_USERNAME -p $DOCKER_PASSWORD
    - docker build -t $DOCKER_IMAGE:latest .
    - docker push $DOCKER_IMAGE:latest
  only:
    - develop